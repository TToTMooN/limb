# Data collection overlay with foot pedal trigger.
#
# Usage (combine with any teleop config):
#   uv run limb/envs/launch.py --config_path configs/yam_gello_network_bimanual.yaml configs/collection_pedal.yaml
#
# Foot pedal controls (iKKEGOL double pedal):
#   Left pedal   →  Start/stop recording
#   Right pedal  →  Discard current episode
# Keyboard fallback:
#   Space / Enter / S / D / Q  →  same as collection.yaml

collection:
  _target_: limb.recording.session.DataCollectionSession
  num_episodes: 10
  task_instruction: "pick up the grey cube and hand it to another hand"
  countdown_s: 0
  recorder:
    _target_: limb.recording.episode_recorder.EpisodeRecorder
    base_dir: "recordings"
    recording_fps: 30
    ee_frame_names:
      left: "ee_link"
      right: "ee_link"
  trigger:
    _target_: limb.recording.trigger.CompositeTrigger
    sources:
      - _target_: limb.recording.trigger.FootPedalTrigger
      - _target_: limb.recording.trigger.KeyboardTrigger
