# Data collection with VR teleop + VR button triggers.
#
# VR button mapping (hands-free, both hands on controllers):
#   B (right controller)  →  Start/stop recording
#   Y (left controller)   →  Discard current episode
# Keyboard fallback (if a helper is available):
#   Space / Enter  →  Start/stop recording
#   S              →  Mark episode as success and save
#   D              →  Discard current episode
#   Q / Escape     →  End collection session
#
# Usage:
#   uv run limb/envs/launch.py --config_path configs/yam_vr_collect.yaml

_target_: limb.envs.launch.LaunchConfig
hz: 100.0

collection:
  _target_: limb.recording.session.DataCollectionSession
  num_episodes: 10
  task_instruction: "pick up the red cube and place it in the bowl"
  countdown_s: 3.0
  recorder:
    _target_: limb.recording.episode_recorder.EpisodeRecorder
    base_dir: "recordings/red_cube_task"
    recording_fps: 30
    ee_frame_names:
      left: "ee_link"
      right: "ee_link"
  trigger:
    _target_: limb.recording.trigger.CompositeTrigger
    sources:
      - _target_: limb.recording.trigger.KeyboardTrigger
      # VRButtonTrigger requires xr_client from the agent — wire this
      # at runtime or pass the agent's xr_client reference after init.

sensors:
  cameras:
    left_wrist_camera:
        _target_: limb.sensors.cameras.camera.CameraNode
        camera:
            _target_: limb.sensors.cameras.realsense_camera.RealsenseCamera
            serial_number: "409122274017"
    right_wrist_camera:
        _target_: limb.sensors.cameras.camera.CameraNode
        camera:
            _target_: limb.sensors.cameras.realsense_camera.RealsenseCamera
            serial_number: "409122274543"

robots:
  left: ["robot_configs/yam/left.yaml"]
  right: ["robot_configs/yam/left.yaml", "robot_configs/yam/right.yaml"]

agent:
  _target_: limb.agents.teleoperation.yam_vr_agent.YamVrAgent
  bimanual: true
  ik_solver: "pink"
  ik_params:
    position_cost: 50.0
    orientation_cost: 10.0
    posture_cost: 0.001
    lm_damping: 1.0
  right_arm_extrinsic:
      position: [0.0, -0.61, 0.0]
      rotation: [1.0, 0.0, 0.0, 0.0]
  scale_factor: 1.5
  rotation_scale_factor: 1.5
  initial_ee_position: [0.25, 0.0, 0.1]
  initial_ee_rpy: [3.14159, 0.0, 1.5708]

station_metadata:
  world_frame: "left_arm"
  extrinsics:
    right_arm_extrinsic:
      position: [0.0, -0.61, 0.0]
      rotation: [1.0, 0.0, 0.0, 0.0]
