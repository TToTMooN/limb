# Data collection with GELLO teleop + keyboard/foot-pedal triggers.
#
# Controls (during teleop):
#   Space / Enter  →  Start/stop recording (foot pedal sends Enter)
#   S              →  Mark episode as success and save
#   D              →  Discard current episode
#   Q / Escape     →  End collection session
#
# Usage:
#   uv run limb/envs/launch.py --config_path configs/yam_gello_collect.yaml

_target_: limb.envs.launch.LaunchConfig
hz: 100.0

collection:
  _target_: limb.recording.session.DataCollectionSession
  num_episodes: 10
  task_instruction: "pick up the red cube and place it in the bowl"
  countdown_s: 3.0
  recorder:
    _target_: limb.recording.episode_recorder.EpisodeRecorder
    base_dir: "recordings/red_cube_task"
    recording_fps: 30
    ee_frame_names:
      left: "ee_link"
      right: "ee_link"
  trigger:
    _target_: limb.recording.trigger.KeyboardTrigger

sensors:
  cameras:
    left_wrist_camera:
        _target_: limb.sensors.cameras.camera.CameraNode
        camera:
            _target_: limb.sensors.cameras.realsense_camera.RealsenseCamera
            serial_number: "409122274017"
    right_wrist_camera:
        _target_: limb.sensors.cameras.camera.CameraNode
        camera:
            _target_: limb.sensors.cameras.realsense_camera.RealsenseCamera
            serial_number: "409122274543"
    head_camera:
        _target_: limb.sensors.cameras.camera.CameraNode
        camera:
            _target_: limb.sensors.cameras.realsense_camera.RealsenseCamera
            serial_number: "215122256240"

robots:
  left: ["robot_configs/yam/left.yaml"]
  right: ["robot_configs/yam/left.yaml", "robot_configs/yam/right.yaml"]

agent:
  _target_: limb.agents.teleoperation.yam_gello_agent.YamGelloAgent
  port: "/dev/ttyUSB0"
  baudrate: 4000000
  bimanual: true
  left_motor_ids: [1, 2, 3, 4, 5, 6]
  right_motor_ids: [7, 8, 9, 10, 11, 12]
  joint_signs_left: [1, -1, 1, 1, -1, 1]
  joint_signs_right: [1, -1, 1, 1, -1, 1]
  default_gripper_value: 0.0

station_metadata:
  world_frame: "left_arm"
  extrinsics:
    right_arm_extrinsic:
      position: [0.0, -0.61, 0.0]
      rotation: [1.0, 0.0, 0.0, 0.0]
